<html>
    <head>
        <title>Log In</title>
        <style>
            body {
                background-color: white;
            }
            .container {
                width: 30%;
                margin: auto;
                padding: 10px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                color: black;
               
            }
            .btn {
                background-color: white;
                border: 1px solid black;
                padding: 10px;
                margin: 10px;
                width: 100%;
                color: black;
            }
            .im {
                width: 10px;
                height: 10px;
                margin-right: 10px;
            }
            h1 {
                text-align: center;
                background-color: black;
                color: white;
                padding: 10px;
            }
            .menu {
                display: flex;
                flex-direction: column;
                justify-content: center;
                text-align: left;
                margin-left: 40%;
            }
            input {
                width: 30%;
                margin-bottom: 10px;
                padding: 5px;
            }
            p {
                text-align: center;
            }
            button {
                width: 30%;
                padding: 10px;
                background-color: blue;
                color: white;
                cursor: pointer;
                transition:all 0.5s ease;
            }
            button:active {
                transform: scale(1.05);
                background-color: rgb(217, 217, 255);
            }
           
            
        </style>
    </head>
    <body>
        <h1>Log In TO My Blog site</h1>
        <br>
        <div class="menu">
            <form>
                <label for="log">Email address or username</label><br>
                <input type="text">
            </form>
            <button>Continue</button>
        </div>
        <p>OR</p>
        <div class="container">
            <button class="btn">
                <img src="google.png" alt="Google" class="im">
                Continue with Google
            </button>
            <button class="btn">
                <img src="apple-logo.png" alt="Apple" class="im">
                Continue with Apple
            </button>
            <button class="btn">
                <img src="github.png" alt="github" class="im">
                Continue with GitHub
            </button>
            <button class="btn">
                <img src="email.png" alt="Email" class="im">
                Continue with Email
            </button>
        </div>
    </body>
</html>
